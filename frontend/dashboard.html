<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CafeSpot — Dashboard</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="dashboard-page">

    <!-- Header -->
    <header class="app-header">
        <div class="header-brand">
            <span class="header-logo">☕</span>
            <span class="header-title">CafeSpot</span>
        </div>
        <div class="header-actions">

            <!-- Favourites dropdown wrapper -->
            <div class="fav-dropdown-wrapper">
                <button class="fav-toggle-btn" id="favToggle">
                    ❤️ Favourites <span class="fav-count-badge" id="favCount"></span>
                </button>

                <!-- Dropdown popup menu -->
                <div class="fav-dropdown" id="favDropdown">
                    <div class="fav-dd-header">
                        <span>❤️ My Favourites</span>
                        <button class="fav-dd-close" id="favDropdownClose">✕</button>
                    </div>
                    <div class="fav-dd-list" id="favDropdownList">
                        <p class="fav-dd-empty">No saved cafes yet.<br>Tap ❤️ on a cafe to save it.</p>
                    </div>
                </div>
            </div>

            <div class="user-info">
                <span class="user-avatar">👤</span>
                <span id="userName"></span>
            </div>
            <button class="btn-logout" id="logoutBtn">Sign Out</button>
        </div>
    </header>

    <!-- Main layout -->
    <div class="app-body">

        <!-- Left panel: search + filters + results -->
        <aside class="left-panel">
            <div class="search-section">
                <h2 class="search-title">Find Cafes Near You</h2>
                <form id="searchForm" class="search-form">
                    <div class="search-box">
                        <input
                            type="text"
                            id="suburbInput"
                            placeholder="Enter a Sydney suburb..."
                            autocomplete="off"
                            required
                        >
                        <ul id="autocompleteDropdown" class="autocomplete-dropdown" hidden></ul>
                    </div>
                    <button type="submit" class="btn-search" id="searchBtn">Find Cafes</button>
                </form>

                <!-- Filters -->
                <div class="filters">
                    <div class="filter-item">
                        <label class="filter-check">
                            <input type="checkbox" id="filterOpen">
                            Open Now
                        </label>
                    </div>
                    <div class="filter-item">
                        <label for="filterRating">Min Rating</label>
                        <select id="filterRating">
                            <option value="0">Any</option>
                            <option value="3">3+</option>
                            <option value="4">4+</option>
                            <option value="4.5">4.5+</option>
                        </select>
                    </div>
                    <div class="filter-item">
                        <label for="filterPrice">Max Price</label>
                        <select id="filterPrice">
                            <option value="4">Any</option>
                            <option value="1">$</option>
                            <option value="2">$$</option>
                            <option value="3">$$$</option>
                        </select>
                    </div>
                </div>
            </div>

            <div class="results-section">
                <div class="results-header">
                    <span id="resultsCount" class="results-count"></span>
                </div>
                <div id="resultsGrid" class="results-grid">
                    <div class="empty-state">
                        <div class="empty-icon">☕</div>
                        <p>Enter a Sydney suburb above to find nearby cafes, sorted closest to farthest.</p>
                    </div>
                </div>
            </div>
        </aside>

        <!-- Right panel: Google Map -->
        <main class="map-panel">
            <div id="map"></div>
        </main>

    </div>

    <!-- Modal container -->
    <div id="modalContainer" hidden></div>

    <script src="js/config.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/api.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/app.js"></script>
    <script>
        // Guard: redirect guests / unauthenticated users to login
        const isGuest = sessionStorage.getItem('cafespot_guest') === 'true';
        if (!isGuest && !Auth.isLoggedIn()) {
            window.location.href = '/index.html';
        }

        // Close dropdown button
        document.getElementById('favDropdownClose').addEventListener('click', (e) => {
            e.stopPropagation();
            document.getElementById('favDropdown').classList.remove('open');
        });
    </script>
    <script
        src="https://maps.googleapis.com/maps/api/js?key=AIzaSyBBH5WNN660-YNrkQnGopV8y4cPOatnwNw&callback=initMap&libraries=places"
        async defer>
    </script>
</body>
</html>
